version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pdf-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  pdf-app:
    build: .
    container_name: pdf-system-main
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3010:3010"
    env_file: .env
    environment:
      - TZ=America/Guayaquil
      - REDIS_HOST=redis
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '6'       # Limita a 6 núcleos de los 8 disponibles
          memory: 8G      # Techo máximo para evitar que Windows se congele
        reservations:
          memory: 2G      # Reserva mínima para que el proceso arranque fluido
    volumes:
      - ./logs:/app/logs
      - ./secrets:/app/secrets # Asegúrate de tener tu llave de Google aquí
      - ./PROCESO_DOC:/app/PROCESO_DOC

volumes:
  redis_data: